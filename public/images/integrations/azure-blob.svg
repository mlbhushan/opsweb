<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <!-- Azure blue gradient background -->
  <defs>
    <linearGradient id="azureGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0078d4"/>
      <stop offset="1" stop-color="#0050a0"/>
    </linearGradient>
  </defs>
  <!-- Stylized Azure "A" / blob icon -->
  <rect width="96" height="96" rx="16" fill="url(#azureGrad)"/>
  <!-- Cloud shape -->
  <ellipse cx="48" cy="46" rx="26" ry="18" fill="white" opacity="0.15"/>
  <ellipse cx="34" cy="44" rx="14" ry="10" fill="white" opacity="0.2"/>
  <!-- Storage cylinders -->
  <ellipse cx="48" cy="35" rx="18" ry="6" fill="white" opacity="0.9"/>
  <rect x="30" y="35" width="36" height="16" fill="white" opacity="0.8"/>
  <ellipse cx="48" cy="51" rx="18" ry="6" fill="white" opacity="0.95"/>
  <!-- Azure label -->
  <text x="48" y="74" font-family="Segoe UI,Arial" font-size="9" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">AZURE BLOB</text>
</svg>
